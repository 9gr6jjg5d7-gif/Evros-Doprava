<!DOCTYPE html>

<html lang="cs">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Děkujeme za poptávku</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    * {

      margin: 0;

      padding: 0;

      box-sizing: border-box;

    }

    body {

      font-family: 'Montserrat', sans-serif;

      background: linear-gradient(180deg, #f7f7f7 0%, #efefef 100%);

      color: #111;

      min-height: 100vh;

      display: flex;

      align-items: center;

      justify-content: center;

      padding: 20px;

    }

    .thanks-card {

      width: 100%;

      max-width: 720px;

      background: #fff;

      border-radius: 24px;

      padding: 48px 36px;

      text-align: center;

      box-shadow: 0 14px 40px rgba(0,0,0,0.08);

      border: 1px solid #ececec;

    }

    .icon {

      width: 88px;

      height: 88px;

      margin: 0 auto 24px;

      border-radius: 22px;

      background: linear-gradient(180deg, #ffd83d 0%, #f1c300 100%);

      display: flex;

      align-items: center;

      justify-content: center;

      font-size: 42px;

      font-weight: 800;

      color: #111;

      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.08), 0 12px 24px rgba(241,195,0,0.22);

    }

    h1 {

      font-size: 42px;

      line-height: 1.15;

      margin-bottom: 16px;

      font-weight: 800;

    }

    p {

      font-size: 18px;

      color: #4a4a4a;

      line-height: 1.7;

      max-width: 560px;

      margin: 0 auto 28px;

    }

    .btn {

      display: inline-flex;

      align-items: center;

      justify-content: center;

      border: none;

      border-radius: 12px;

      padding: 14px 24px;

      font-weight: 800;

      font-size: 15px;

      cursor: pointer;

      transition: 0.25s ease;

      background: linear-gradient(180deg, #ffd83d 0%, #f3c400 100%);

      color: #111;

      text-decoration: none;

      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.08), 0 8px 18px rgba(243,196,0,0.18);

    }

    .btn:hover {

      transform: translateY(-1px);

    }

    @media (max-width: 768px) {

      .thanks-card {

        padding: 34px 22px;

        border-radius: 18px;

      }

      h1 {

        font-size: 30px;

      }

      p {

        font-size: 16px;

      }

      .icon {

        width: 76px;

        height: 76px;

        font-size: 34px;

      }

    }

  </style>

</head>

<body>

  <div class="thanks-card">

    <div class="icon">✓</div>

    <h1>Děkujeme za vaši poptávku</h1>

    <p>

      Vaše zpráva byla úspěšně odeslána. Ozveme se vám co nejdříve.

    </p>

    <a class="btn" href="index.html">ZPĚT NA HLAVNÍ STRÁNKU</a>

  </div>

</body>

</html>
